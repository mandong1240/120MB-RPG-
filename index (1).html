<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>120MB+ 무기강화 RPG · 시너지 도감</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#13100B;--bg-2:#181410;--surface:#211B13;--surface-2:#2A2218;--border:#3A2F22;--border-hot:#7A5A2E;
  --text:#F2EADC;--text-dim:#A89880;--text-faint:#6F6350;
  --ember:#F0A038;--ember-deep:#C2761F;--ember-glow:#F0A03833;
  --tier1:#7C6F5A;--tier2:#B7935A;--tier3:#E0A93C;--tier4:#FFD86B;
  --font-body:"Pretendard","Pretendard Variable",system-ui,sans-serif;
  --font-disp:"Bebas Neue","Pretendard",sans-serif;--font-mono:"JetBrains Mono",ui-monospace,monospace;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.6;-webkit-font-smoothing:antialiased}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
img{image-rendering:pixelated;image-rendering:crisp-edges}

.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#1a150e,#13100bee);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.topbar-inner{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:18px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0}
.logo-mark{width:40px;height:40px;display:grid;place-items:center;border-radius:10px;background:radial-gradient(circle at 35% 30%,#F0A038,#9c5a14);box-shadow:0 0 22px -5px var(--ember),inset 0 1px 1px #ffce8a55}
.logo-mark svg{width:23px;height:23px}
.logo-txt b{display:block;font-family:var(--font-disp);font-size:21px;letter-spacing:.04em;line-height:1}
.logo-txt span{font-family:var(--font-mono);font-size:10px;color:var(--ember);letter-spacing:.14em}
.search{position:relative;margin-left:auto;flex:1;max-width:300px}
.search input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;padding:9px 12px 9px 34px;border-radius:9px;outline:none;transition:border-color .15s}
.search input:focus{border-color:var(--border-hot)}
.search input::placeholder{color:var(--text-faint)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-faint)}
.tabs{display:flex;gap:4px;flex-shrink:0}
.tab{font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.04em;padding:8px 15px;border-radius:8px;border:1px solid transparent;background:none;color:var(--text-dim);cursor:pointer;transition:all .14s}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.active{background:var(--surface-2);color:var(--ember);border-color:var(--border)}

.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(620px 300px at 82% -20%,#F0A03826,transparent 70%),radial-gradient(460px 260px at 8% 130%,#C2761F1f,transparent 70%)}
.hero-inner{position:relative;max-width:1180px;margin:0 auto;padding:54px 28px 46px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ember);text-transform:uppercase;border:1px solid var(--border-hot);background:var(--ember-glow);padding:5px 12px;border-radius:99px;margin-bottom:18px}
.hero h1{font-family:var(--font-disp);font-size:clamp(40px,7vw,76px);letter-spacing:.02em;line-height:.95;margin-bottom:14px}
.hero h1 em{font-style:normal;color:var(--ember)}
.hero p{font-size:16px;color:var(--text-dim);max-width:600px}
.hero-stats{display:flex;gap:40px;margin-top:30px;flex-wrap:wrap}
.hero-stat b{display:block;font-family:var(--font-mono);font-size:30px;font-weight:800;color:var(--ember)}
.hero-stat span{font-size:12px;color:var(--text-faint);letter-spacing:.04em}
.tier-legend{display:flex;margin-top:30px;max-width:560px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tier-legend .seg{flex:1;padding:10px 14px;font-family:var(--font-mono);text-align:center}
.tier-legend .seg+.seg{border-left:1px solid var(--border)}
.tier-legend .seg .n{font-size:13px;font-weight:800;display:block}
.tier-legend .seg .l{font-size:9.5px;color:var(--text-faint);letter-spacing:.06em}

.wrap{max-width:1180px;margin:0 auto;padding:40px 28px 90px}
.view{display:none}.view.active{display:block}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.chip{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:12px;font-weight:500;padding:5px 11px;border-radius:8px;border:1px solid transparent;cursor:pointer;background:var(--surface);color:var(--text-dim);transition:all .14s}
.chip .dot{width:9px;height:9px;border-radius:50%;background:var(--c,#888);box-shadow:0 0 8px -1px var(--c,#888)}
.chip:hover{color:var(--text);border-color:var(--border)}
.chip.on{background:var(--surface-2);color:var(--text);border-color:var(--c,var(--border))}

.syn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
.syn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;border-top:3px solid var(--c,var(--border))}
.syn-head{padding:18px 20px 14px}
.syn-title{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.syn-title .dot{width:13px;height:13px;border-radius:50%;background:var(--c);box-shadow:0 0 12px -2px var(--c)}
.syn-title h3{font-family:var(--font-disp);font-size:24px;letter-spacing:.03em}
.syn-title .count{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}
.syn-desc{font-size:13px;color:var(--text-dim)}
.syn-desc.todo{color:var(--text-faint);font-style:italic}
.breaks{display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 16px}
.brk{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px}
.brk .num{font-family:var(--font-mono);font-weight:800;font-size:12px;color:var(--c);background:var(--surface-2);border-radius:6px;width:24px;height:22px;display:grid;place-items:center;flex-shrink:0}
.brk .eff{color:var(--text-dim)}
.syn-weps{border-top:1px solid var(--border);padding:14px 20px;background:var(--bg-2)}
.syn-weps .wlabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--text-faint);text-transform:uppercase;margin-bottom:9px}
.wep-pills{display:flex;flex-wrap:wrap;gap:6px}
.wep-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:4px 9px 4px 5px;color:var(--text-dim)}
.wep-pill .ic{width:22px;height:22px;border-radius:5px;background:var(--bg);display:grid;place-items:center;flex-shrink:0}
.wep-pill .ic img{width:18px;height:18px;object-fit:contain}
.wep-pill .ic svg{width:13px;height:13px;color:var(--text-faint)}
.wep-pill .rg{font-family:var(--font-mono);font-size:10.5px;font-weight:700;color:var(--text)}

.wep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.wep{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:border-color .16s,transform .16s}
.wep:hover{border-color:var(--border-hot);transform:translateY(-2px)}
.wep-name{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.wep-thumb{width:50px;height:50px;border-radius:10px;background:linear-gradient(160deg,#241d14,#191510);border:1px solid var(--border);display:grid;place-items:center;flex-shrink:0;overflow:hidden}
.wep-thumb img{width:42px;height:42px;object-fit:contain}
.wep-thumb svg{width:24px;height:24px;color:var(--ember-deep)}
.wep-title{display:flex;flex-direction:column;gap:2px;min-width:0}
.wep-title b{font-family:var(--font-disp);font-size:23px;letter-spacing:.03em;line-height:1}
.wep-title .ice{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;color:#74D4FF;text-transform:uppercase}
.track{display:flex;flex-direction:column;gap:7px}
.tier-row{display:flex;align-items:center;gap:12px}
.tier-rng{font-family:var(--font-mono);font-size:11px;font-weight:800;color:var(--text-faint);width:46px;flex-shrink:0;text-align:right}
.tier-bar{flex:1;display:flex;align-items:center;gap:9px;background:var(--bg-2);border:1px solid var(--border);border-left:4px solid var(--c,var(--border));border-radius:7px;padding:7px 11px}
.tier-bar .dot{width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 8px -1px var(--c);flex-shrink:0}
.tier-bar .sname{font-size:13px;color:var(--text);font-weight:500}
.tier-bar.empty{border-left-color:var(--border);opacity:.4}
.tier-bar.empty .sname{font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}
.empty-msg{padding:50px;text-align:center;color:var(--text-faint);font-family:var(--font-mono);font-size:13px;border:1px dashed var(--border);border-radius:var(--radius)}
footer{border-top:1px solid var(--border);padding:26px 28px;text-align:center;color:var(--text-faint);font-size:12px;font-family:var(--font-mono)}
@media (max-width:760px){
  .topbar-inner{flex-wrap:wrap;gap:12px}
  .search{order:3;max-width:none;margin-left:0;width:100%}
  .tabs{margin-left:auto}
  .hero-inner,.wrap{padding-left:18px;padding-right:18px}
  .syn-grid,.wep-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a href="#top" class="logo">
      <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#3a1f06" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4 20 9.5 9.5 20 4 14.5Z"/><path d="m5 19-1.5 1.5"/><path d="M15 6.5 17.5 9"/></svg></span>
      <span class="logo-txt"><b>120MB+ 무기강화 RPG</b><span>SYNERGY CODEX</span></span>
    </a>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input type="text" id="search" placeholder="시너지·무기 검색…" autocomplete="off">
    </div>
    <div class="tabs">
      <button class="tab active" data-view="synergy">시너지별</button>
      <button class="tab" data-view="weapon">무기별</button>
    </div>
  </div>
</header>
<section class="hero" id="top">
  <div class="hero-inner">
    <span class="hero-eyebrow">Minecraft Bedrock · 무기강화 RPG</span>
    <h1>강화할수록 바뀌는 <em>시너지</em>의 세계</h1>
    <p>무기를 <b>+1에서 +10</b>까지 강화하면 활성화되는 시너지가 달라진다. 같은 시너지를 여러 개 모아 단계 효과를 끌어올리는, TFT식 무기강화 도감.</p>
    <div class="hero-stats">
      <div class="hero-stat"><b id="stat-syn">—</b><span>시너지</span></div>
      <div class="hero-stat"><b id="stat-wep">—</b><span>무기</span></div>
      <div class="hero-stat"><b>+10</b><span>최대 강화</span></div>
    </div>
    <div class="tier-legend">
      <div class="seg"><span class="n" style="color:var(--tier1)">+1~4</span><span class="l">기초</span></div>
      <div class="seg"><span class="n" style="color:var(--tier2)">+5~7</span><span class="l">연마</span></div>
      <div class="seg"><span class="n" style="color:var(--tier3)">+8~9</span><span class="l">상위</span></div>
      <div class="seg"><span class="n" style="color:var(--tier4)">+10</span><span class="l">완성</span></div>
    </div>
  </div>
</section>
<div class="wrap">
  <div class="legend" id="legend"></div>
  <section class="view active" id="view-synergy"><div class="syn-grid" id="synGrid"></div></section>
  <section class="view" id="view-weapon"><div class="wep-grid" id="wepGrid"></div></section>
</div>
<footer>120MB+ 무기강화 RPG · 시너지 도감 · 비공식 가이드</footer>

  ignite:{ name:"점화단", color:"#FF4D1F", desc:"효과 정보 추가 예정.", todo:true, breaks:[] },
  goldbull:{ name:"황금 황소", color:"#F2C53D", desc:"던전 처치 시 전리품을 더 많이 획득한다.",
    breaks:[[1,"전리품 +20%"],[2,"+90%"],[3,"+200%"],[4,"+500%"]] },
  berserk:{ name:"광전사", color:"#C73A2C", desc:"활성화된 시너지 개수당 추가 능력치를 얻는다.",
    breaks:[[2,"체력·피해 +3%"],[3,"+5.5%"],[4,"+15%"]] },
  duelist:{ name:"결투가", color:"#93A2B5", desc:"힘 효과를 부여한다.",
    breaks:[[3,"힘 Ⅰ"],[5,"힘 Ⅱ"],[7,"힘 Ⅲ"],[9,"힘 Ⅳ"]] },
  seal:{ name:"봉인", color:"#6C6AF0", desc:"주변 플레이어의 핫바 아이템 쿨타임을 강제로 늘린다.",
    breaks:[[2,"1개 · 1.5초"],[4,"3개 · 4초"],[6,"5개 · 8초"],[8,"핫바 전체"]] },
  guild:{ name:"길드", color:"#43C49B", desc:"같은 길드원이 온라인일 때 활성화된다.",
    breaks:[[2,"전리품 +10%"],[4,"황금 황소 1 활성화"],[6,"전체 시너지 +1"]] },
};

/* ── 무기 → 텍스처 매핑  (※ ? 표시는 추정. 틀리면 여기만 고치면 됨) ── */
const WEAPON_TEX = {
  "암흑의 검":"dark_sword",
  "선동자의 망치":"goblin_mace",        // ?
  "반의 창":"vaan_spear",
  "빛의 창":"light_spear",
  "양날 도끼":"double_head_axe",
  "팬덤의 망치":"pandom_hammer",
  "하트 브레이커":"heartstealer",
  "챈슬러의 검":"greedy_sword",          // ?
  "크릴의 창":"fortuneSpear",            // ?
  "라프의 창":"larp_spear",
  "골렘의 창":"ancient_axe",             // ?? 딱 맞는 창 텍스처 없음
  "세르히오의 망치":"heal_staff",        // ?? 망치 텍스처 부족
  "바이킹의 방패":"viking_shield",
  "팔라딘의 방패":"paladin_shield",
  "어인 가라데":"thunder_sword",         // ??
  "불의 검":"fire_sword",
  "기사의 검":"knight_sword",
  "단소의 검":"masterKatana",            // ?
  "늑대의 도끼":"whirlwind",             // ? (구 '회오리')
  "심해의 낫":"jailorScythe",
  "도적의 단검":"bandit_dagger",
  "로스트 베인":"lost_vayne",
  "거북 마스터의 검":"turtle_sword",
  "아수라의 대검":"asura_dagger",
  "흑도":"darkKatana",                   // ?
  "검은 마법사의 방패":"black_wizard_shield",
  "카오스의 방패":"kaos_shield",
  "[Ice] 늑대의 도끼":"armas_dagger",    // ??
  "[Ice] 골렘의 창":"bind_sword",        // ??
  "[Ice] 팔라딘의 방패":"paladin_shield",// ?? (얼음 전용 텍스처 있으면 교체)
  "[Ice] 예티의 도끼":"pt",              // ice_axe
};

/* ── 무기 정의 (강화 구간별 시너지: +1~4 / +5~7 / +8~9 / +10) ── */
const TIER_RANGES = ["+1~4","+5~7","+8~9","+10"];
const WEAPONS = [
  { name:"암흑의 검",        tiers:["void","dimension","fortress","heretic"] },
  { name:"선동자의 망치",     tiers:["warrior","fortress","dimension","flame"] },
  { name:"반의 창",          tiers:["heal","void","sniper","dimension"] },
  { name:"빛의 창",          tiers:["heal","challenger","dimension","sniper"] },
  { name:"양날 도끼",        tiers:["rampager","dimension","challenger","frost"] },
  { name:"팬덤의 망치",       tiers:["dimension","fortress","challenger","heal"] },
  { name:"하트 브레이커",     tiers:["dimension","void","heretic","berserk"] },
  { name:"챈슬러의 검",       tiers:["evil","heal","fortress","goldbull"] },
  { name:"크릴의 창",        tiers:["fortress","sniper","frost",null] },
  { name:"라프의 창",        tiers:["evil","fortress","sniper","frost"] },
  { name:"골렘의 창",        tiers:["ishtal","fortress","heretic","challenger"] },
  { name:"세르히오의 망치",   tiers:["warrior","fortress","challenger","heal"] },
  { name:"바이킹의 방패",     tiers:["sage","rampager","fortress","heal"] },
  { name:"팔라딘의 방패",     tiers:["sage","rampager","fortress","flame"] },
  { name:"어인 가라데",       tiers:["rampager","fortress","challenger","flame"] },
  { name:"불의 검",          tiers:["fortress","heal","flame","ignite"] },
  { name:"기사의 검",        tiers:["heal","evil","challenger","heretic"] },
  { name:"단소의 검",        tiers:["challenger","heal","sage","sniper"] },
  { name:"늑대의 도끼",       tiers:["sage","rampager","heal","sniper"] },
  { name:"심해의 낫",        tiers:["challenger","heal","frost","sniper"] },
  { name:"도적의 단검",       tiers:["void","heretic","sniper","frost"] },
  { name:"로스트 베인",       tiers:["sage","sniper","frost",null] },
  { name:"거북 마스터의 검",   tiers:["warrior","challenger","sage","flame"] },
  { name:"아수라의 대검",     tiers:["evil","challenger","flame","ignite"] },
  { name:"흑도",            tiers:["void","warrior","heretic","frost"] },
  { name:"검은 마법사의 방패", tiers:["void","rampager","ishtal","heretic"] },
  { name:"카오스의 방패",     tiers:["void",null,"evil","heretic"] },
  { name:"[Ice] 늑대의 도끼", tiers:["heal","frost","sniper","dimension"] },
  { name:"[Ice] 골렘의 창",   tiers:["dimension","heretic","sniper","frost"] },
  { name:"[Ice] 팔라딘의 방패",tiers:["rampager","fortress","sage","frost"] },
  { name:"[Ice] 예티의 도끼", tiers:["warrior","frost","challenger","goldbull"] },
];


/* ── 렌더링 로직 ── */
const $ = s => document.querySelector(s);
const synName = id => SYNERGIES[id]?.name || id;
const synColor = id => SYNERGIES[id]?.color || "#666";

// 무기 종류 판정 (텍스처 없을 때 fallback 아이콘용)
const ICONS = {
  sword:'<path d="M14.5 4 20 9.5 9.5 20 4 14.5Z"/><path d="M15 6.5 17.5 9"/>',
  spear:'<path d="M20 4 8 16"/><path d="M4 20l3-1 1-3-3 1z"/><path d="M16 4h4v4"/>',
  axe:'<path d="M14 4c3 0 6 2 6 5l-4 1-3-3z"/><path d="M13 7 4 16l2 2 9-9"/>',
  shield:'<path d="M12 2 4 5v6c0 5 4 8 8 9 4-1 8-4 8-9V5Z"/>',
  dagger:'<path d="M18 4 9 13l-2-2 9-9z"/><path d="M9 13l-5 5 2 2 5-5z"/>',
  scythe:'<path d="M4 4c10 0 16 6 16 14"/><path d="M4 4v6"/>',
  hammer:'<rect x="6" y="3" width="12" height="6" rx="1"/><path d="M11 9v12"/>',
  fist:'<path d="M6 11V8a2 2 0 0 1 4 0v2M10 9V6a2 2 0 0 1 4 0v4M14 8a2 2 0 0 1 4 0v6a6 6 0 0 1-6 6H9l-4-4"/>'
};
function wType(n){
  if(n.includes("낫"))return"scythe";
  if(n.includes("방패"))return"shield";
  if(n.includes("창"))return"spear";
  if(n.includes("도끼"))return"axe";
  if(n.includes("망치"))return"hammer";
  if(n.includes("단검")||n.includes("단소"))return"dagger";
  if(n.includes("가라데"))return"fist";
  return"sword";
}
function thumbHTML(name,size){
  const texId = WEAPON_TEX[name];
  const src = texId && TEX[texId];
  if(src) return `<img src="${src}" alt="${name}">`;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[wType(name)]}</svg>`;
}
function cleanName(n){ return n.replace("[Ice] ","").replace("[Ice]","").trim(); }

$("#stat-syn").textContent = Object.keys(SYNERGIES).length;
$("#stat-wep").textContent = WEAPONS.length;

const synToWeapons = {};
WEAPONS.forEach(w=>w.tiers.forEach((sid,i)=>{ if(sid)(synToWeapons[sid]??=[]).push({name:w.name,range:TIER_RANGES[i]}); }));

const state={view:"synergy",filter:new Set(),q:""};

$("#legend").innerHTML = Object.entries(SYNERGIES).map(([id,s])=>`<span class="chip" data-syn="${id}" style="--c:${s.color}"><span class="dot"></span>${s.name}</span>`).join("");
document.querySelectorAll("[data-syn]").forEach(el=>el.addEventListener("click",()=>{
  const k=el.dataset.syn; state.filter.has(k)?state.filter.delete(k):state.filter.add(k); el.classList.toggle("on"); render();
}));
function matchQ(t){ return !state.q||t.toLowerCase().includes(state.q); }

function renderSynergy(){
  const grid=$("#synGrid");
  const ids=Object.keys(SYNERGIES).filter(id=>{
    if(state.filter.size&&!state.filter.has(id))return false;
    return matchQ(SYNERGIES[id].name+" "+(synToWeapons[id]||[]).map(w=>w.name).join(" "));
  });
  if(!ids.length){grid.innerHTML=`<div class="empty-msg">조건에 맞는 시너지가 없어.</div>`;return;}
  grid.innerHTML=ids.map(id=>{
    const s=SYNERGIES[id], weps=synToWeapons[id]||[];
    const breaks=s.breaks.map(([n,e])=>`<span class="brk"><span class="num">${n}</span><span class="eff">${e}</span></span>`).join("");
    const pills=weps.map(w=>`<span class="wep-pill"><span class="ic">${thumbHTML(w.name)}</span>${cleanName(w.name)} <span class="rg">${w.range}</span></span>`).join("");
    return `<article class="syn" style="--c:${s.color}">
      <div class="syn-head"><div class="syn-title"><span class="dot"></span><h3>${s.name}</h3><span class="count">${weps.length} 무기</span></div>
      <p class="syn-desc ${s.todo?'todo':''}">${s.desc}</p></div>
      ${breaks?`<div class="breaks">${breaks}</div>`:''}
      <div class="syn-weps"><div class="wlabel">이 시너지를 켜는 무기 / 강화 구간</div>
      <div class="wep-pills">${pills||'<span class="wep-pill" style="color:var(--text-faint)">없음</span>'}</div></div>
    </article>`;
  }).join("");
}
function renderWeapon(){
  const grid=$("#wepGrid");
  const list=WEAPONS.filter(w=>{
    if(state.filter.size&&!w.tiers.some(t=>t&&state.filter.has(t)))return false;
    return matchQ(w.name+" "+w.tiers.filter(Boolean).map(synName).join(" "));
  });
  if(!list.length){grid.innerHTML=`<div class="empty-msg">조건에 맞는 무기가 없어.</div>`;return;}
  grid.innerHTML=list.map(w=>{
    const isIce=w.name.includes("[Ice]");
    const rows=w.tiers.map((sid,i)=>{
      if(!sid)return `<div class="tier-row"><span class="tier-rng">${TIER_RANGES[i]}</span><div class="tier-bar empty"><span class="sname">— 없음 —</span></div></div>`;
      return `<div class="tier-row"><span class="tier-rng">${TIER_RANGES[i]}</span><div class="tier-bar" style="--c:${synColor(sid)}"><span class="dot"></span><span class="sname">${synName(sid)}</span></div></div>`;
    }).join("");
    return `<article class="wep">
      <div class="wep-name"><span class="wep-thumb">${thumbHTML(w.name)}</span>
      <span class="wep-title"><b>${cleanName(w.name)}</b>${isIce?'<span class="ice">❄ Ice 변형</span>':''}</span></div>
      <div class="track">${rows}</div></article>`;
  }).join("");
}
function render(){ state.view==="synergy"?renderSynergy():renderWeapon(); }
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  state.view=t.dataset.view;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t));
  $("#view-synergy").classList.toggle("active",state.view==="synergy");
  $("#view-weapon").classList.toggle("active",state.view==="weapon");
  render();
}));
$("#search").addEventListener("input",e=>{state.q=e.target.value.trim().toLowerCase();render();});
render();
</script>
</body>
</html>
